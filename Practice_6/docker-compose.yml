version: '3.9'

services:

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ml_db
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ml_db
    ports:
      - "5432:5432"
